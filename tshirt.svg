<svg xmlns="http://www.w3.org/2000/svg" width="3600" height="3600" viewBox="0 0 3600 3600">
  <defs>
    <filter id="gcyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gamber" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="3600" height="3600" fill="#07050a"/>

  <!-- Outer border -->
  <rect x="80" y="80" width="3440" height="3440" fill="none"
    stroke="#00e5ff" stroke-width="6" opacity="0.4"/>
  <rect x="110" y="110" width="3380" height="3380" fill="none"
    stroke="#00e5ff" stroke-width="2" opacity="0.15"/>

  <!-- Corner marks -->
  <line x1="80" y1="80" x2="240" y2="80" stroke="#00e5ff" stroke-width="8" opacity="0.8"/>
  <line x1="80" y1="80" x2="80" y2="240" stroke="#00e5ff" stroke-width="8" opacity="0.8"/>

  <line x1="3520" y1="80" x2="3360" y2="80" stroke="#00e5ff" stroke-width="8" opacity="0.8"/>
  <line x1="3520" y1="80" x2="3520" y2="240" stroke="#00e5ff" stroke-width="8" opacity="0.8"/>

  <line x1="80" y1="3520" x2="240" y2="3520" stroke="#00e5ff" stroke-width="8" opacity="0.8"/>
  <line x1="80" y1="3520" x2="80" y2="3360" stroke="#00e5ff" stroke-width="8" opacity="0.8"/>

  <line x1="3520" y1="3520" x2="3360" y2="3520" stroke="#00e5ff" stroke-width="8" opacity="0.8"/>
  <line x1="3520" y1="3520" x2="3520" y2="3360" stroke="#00e5ff" stroke-width="8" opacity="0.8"/>

  <!-- Name block -->
  <text x="1800" y="920" font-family="monospace" font-size="320" font-weight="bold"
    fill="#f0deb8" text-anchor="middle" letter-spacing="8">Joshua</text>
  <text x="1800" y="1230" font-family="monospace" font-size="320" font-weight="bold"
    fill="#00e5ff" text-anchor="middle" letter-spacing="8"
    filter="url(#gcyan)">Birk</text>

  <!-- Rule under name -->
  <line x1="300" y1="1320" x2="3300" y2="1320"
    stroke="#00e5ff" stroke-width="3" opacity="0.25"/>

  <!-- ASCII art block -->
  <text x="1800" y="1520" font-family="monospace" font-size="110"
    fill="#c8a870" text-anchor="middle" opacity="0.9">▓▓▓  ░░  ▓▓▓  ░░  ▓▓▓▓  ░  ▓▓▓▓▓</text>
  <text x="1800" y="1640" font-family="monospace" font-size="110"
    fill="#c8a870" text-anchor="middle" opacity="0.9">▓       ▓     ▓   ▓    ▓  ░  ▓   ▓</text>
  <text x="1800" y="1760" font-family="monospace" font-size="110"
    fill="#c8a870" text-anchor="middle" opacity="0.9">▓  ░░░  ▓     ▓   ▓ ░░ ▓  ░  ▓   ▓</text>
  <text x="1800" y="1880" font-family="monospace" font-size="110"
    fill="#c8a870" text-anchor="middle" opacity="0.9">▓▓▓▓▓▓  ▓▓▓▓▓▓▓   ▓▓▓▓▓   ░  ▓▓▓▓▓</text>

  <!-- Rule -->
  <line x1="300" y1="1970" x2="3300" y2="1970"
    stroke="#00e5ff" stroke-width="3" opacity="0.18"/>

  <!-- Tech wave line -->
  <text x="1800" y="2140" font-family="monospace" font-size="130" font-weight="bold"
    fill="#00e5ff" text-anchor="middle" letter-spacing="4"
    filter="url(#glow-soft)">CGI → REST → IoT → AI+MCP</text>

  <!-- Rule -->
  <line x1="300" y1="2230" x2="3300" y2="2230"
    stroke="#00e5ff" stroke-width="3" opacity="0.18"/>

  <!-- Tagline -->
  <text x="1800" y="2440" font-family="monospace" font-size="120"
    fill="#5a4a38" text-anchor="middle" letter-spacing="10">SAME HABIT.</text>
  <text x="1800" y="2580" font-family="monospace" font-size="120"
    fill="#5a4a38" text-anchor="middle" letter-spacing="10">THIRTY YEARS.</text>

  <!-- Rule -->
  <line x1="300" y1="2680" x2="3300" y2="2680"
    stroke="#ffaa00" stroke-width="3" opacity="0.2"/>

  <!-- Diamond separator -->
  <polygon points="1800,2710 1820,2740 1800,2770 1780,2740"
    fill="#ffaa00" filter="url(#gamber)"/>

  <!-- URL -->
  <text x="1800" y="2920" font-family="monospace" font-size="100"
    fill="#00e5ff" text-anchor="middle" letter-spacing="4"
    filter="url(#glow-soft)" opacity="0.7">joshbirk.github.io/resume</text>

  <!-- Bottom rule -->
  <line x1="300" y1="3000" x2="3300" y2="3000"
    stroke="#00e5ff" stroke-width="3" opacity="0.12"/>

  <!-- Tiny credit line -->
  <text x="1800" y="3380" font-family="monospace" font-size="72"
    fill="#2a1f14" text-anchor="middle" letter-spacing="6">TECHNOLOGY ADVOCATE  ·  DEVELOPER RELATIONS  ·  AI ADVOCACY</text>

  <!-- The line -->
  <text x="1800" y="3480" font-family="monospace" font-size="80"
    fill="#5a4a38" text-anchor="middle" letter-spacing="2"
    font-style="italic">not bad for a guy who started in PERL.</text>

</svg>
