<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" aria-label="Path receding into misty horizon">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2818"/>
      <stop offset="40%" stop-color="#8a4824"/>
      <stop offset="60%" stop-color="#c66b3d"/>
      <stop offset="80%" stop-color="#e8b890"/>
      <stop offset="100%" stop-color="#f3ede2"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3ede2"/>
      <stop offset="40%" stop-color="#c4a880"/>
      <stop offset="100%" stop-color="#5a4030"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5e3c2" stop-opacity="1"/>
      <stop offset="30%" stop-color="#e8b890" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c66b3d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pathGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8b890"/>
      <stop offset="100%" stop-color="#8a6240"/>
    </linearGradient>
    <linearGradient id="mistGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3ede2" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f3ede2" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="1600" height="540" fill="url(#skyGrad)"/>

  <!-- sun glow at horizon -->
  <circle cx="800" cy="540" r="320" fill="url(#sunGlow)"/>
  <circle cx="800" cy="540" r="60" fill="#f5e3c2" opacity="0.95"/>

  <!-- distant mountain ridges (multiple layers for depth) -->
  <!-- farthest ridge -->
  <path d="M 0,510 Q 200,480 400,495 T 800,490 T 1200,500 T 1600,505 L 1600,540 L 0,540 Z" fill="#8a5a3a" opacity="0.45"/>
  <!-- mid ridge -->
  <path d="M 0,525 Q 150,505 350,520 T 700,515 Q 900,505 1100,525 T 1600,520 L 1600,545 L 0,545 Z" fill="#6a4028" opacity="0.6"/>
  <!-- near ridge -->
  <path d="M 0,540 Q 200,525 400,540 T 800,535 Q 1000,525 1300,545 T 1600,540 L 1600,560 L 0,560 Z" fill="#4a2c1a" opacity="0.8"/>

  <!-- ground -->
  <rect y="540" width="1600" height="360" fill="url(#groundGrad)"/>

  <!-- path (perspective: narrow at horizon, wide at foreground) -->
  <path d="M 770,540 L 830,540 L 1050,900 L 550,900 Z" fill="url(#pathGrad)"/>
  <!-- path edge highlights -->
  <path d="M 770,540 L 550,900" stroke="#a07050" stroke-width="2" opacity="0.5"/>
  <path d="M 830,540 L 1050,900" stroke="#a07050" stroke-width="2" opacity="0.5"/>
  <!-- path texture lines -->
  <g stroke="#8a5a3a" stroke-width="1" opacity="0.3" fill="none">
    <path d="M 785,580 L 760,580"/>
    <path d="M 815,580 L 840,580"/>
    <path d="M 775,640 L 720,640"/>
    <path d="M 825,640 L 880,640"/>
    <path d="M 760,720 L 670,720"/>
    <path d="M 840,720 L 930,720"/>
    <path d="M 740,810 L 600,810"/>
    <path d="M 860,810 L 1000,810"/>
  </g>

  <!-- trees/vegetation on left -->
  <g fill="#2a1a0e">
    <!-- distant trees -->
    <ellipse cx="120" cy="525" rx="40" ry="30"/>
    <ellipse cx="190" cy="528" rx="35" ry="26"/>
    <ellipse cx="290" cy="522" rx="50" ry="35"/>
    <ellipse cx="380" cy="528" rx="38" ry="28"/>

    <!-- mid-distance trees -->
    <g>
      <rect x="80" y="540" width="6" height="50"/>
      <path d="M 60,545 Q 83,490 106,545 Q 100,560 83,560 Q 66,560 60,545 Z"/>
    </g>
    <g>
      <rect x="200" y="555" width="7" height="45"/>
      <path d="M 178,560 Q 203.5,500 229,560 Q 222,578 203.5,578 Q 185,578 178,560 Z"/>
    </g>
    <g>
      <rect x="320" y="565" width="8" height="50"/>
      <path d="M 295,570 Q 324,500 353,570 Q 345,592 324,592 Q 303,592 295,570 Z"/>
    </g>

    <!-- foreground trees (larger, simpler silhouettes) -->
    <g>
      <rect x="60" y="620" width="14" height="280"/>
      <path d="M 0,640 Q 67,470 134,640 Q 110,690 67,690 Q 24,690 0,640 Z"/>
    </g>
    <g>
      <rect x="200" y="700" width="12" height="200"/>
      <path d="M 140,720 Q 206,580 272,720 Q 250,758 206,758 Q 162,758 140,720 Z"/>
    </g>
    <g>
      <rect x="380" y="780" width="10" height="120"/>
      <path d="M 340,790 Q 385,710 430,790 Q 415,810 385,810 Q 355,810 340,790 Z"/>
    </g>
  </g>

  <!-- trees on right -->
  <g fill="#2a1a0e">
    <!-- distant -->
    <ellipse cx="1480" cy="525" rx="40" ry="30"/>
    <ellipse cx="1400" cy="528" rx="35" ry="26"/>
    <ellipse cx="1300" cy="522" rx="50" ry="35"/>
    <ellipse cx="1210" cy="528" rx="38" ry="28"/>

    <!-- mid -->
    <g>
      <rect x="1514" y="540" width="6" height="50"/>
      <path d="M 1494,545 Q 1517,490 1540,545 Q 1534,560 1517,560 Q 1500,560 1494,545 Z"/>
    </g>
    <g>
      <rect x="1393" y="555" width="7" height="45"/>
      <path d="M 1371,560 Q 1396.5,500 1422,560 Q 1415,578 1396.5,578 Q 1378,578 1371,560 Z"/>
    </g>
    <g>
      <rect x="1272" y="565" width="8" height="50"/>
      <path d="M 1247,570 Q 1276,500 1305,570 Q 1297,592 1276,592 Q 1255,592 1247,570 Z"/>
    </g>

    <!-- foreground -->
    <g>
      <rect x="1526" y="620" width="14" height="280"/>
      <path d="M 1466,640 Q 1533,470 1600,640 Q 1576,690 1533,690 Q 1490,690 1466,640 Z"/>
    </g>
    <g>
      <rect x="1388" y="700" width="12" height="200"/>
      <path d="M 1328,720 Q 1394,580 1460,720 Q 1438,758 1394,758 Q 1350,758 1328,720 Z"/>
    </g>
    <g>
      <rect x="1210" y="780" width="10" height="120"/>
      <path d="M 1170,790 Q 1215,710 1260,790 Q 1245,810 1215,810 Q 1185,810 1170,790 Z"/>
    </g>
  </g>

  <!-- atmospheric mist over the horizon -->
  <rect y="500" width="1600" height="80" fill="url(#mistGrad)" opacity="0.55"/>

  <!-- light rays from sun (subtle) -->
  <g opacity="0.18" fill="#f5e3c2">
    <polygon points="800,540 600,200 620,200"/>
    <polygon points="800,540 700,180 720,180"/>
    <polygon points="800,540 900,180 880,180"/>
    <polygon points="800,540 1000,200 980,200"/>
  </g>

  <!-- subtle haze in distance over path -->
  <rect x="700" y="500" width="200" height="80" fill="#f3ede2" opacity="0.3"/>
</svg>
