<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#07050a"/>
  <rect x="0" y="0" width="32" height="1" fill="#00e5ff" opacity="0.4"/>
  <rect x="0" y="31" width="32" height="1" fill="#00e5ff" opacity="0.4"/>
  <rect x="0" y="0" width="1" height="32" fill="#00e5ff" opacity="0.4"/>
  <rect x="31" y="0" width="1" height="32" fill="#00e5ff" opacity="0.4"/>
  <text x="16" y="22" font-family="monospace" font-size="16" font-weight="700" fill="#00e5ff" text-anchor="middle"
    filter="url(#glow)">JB</text>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
